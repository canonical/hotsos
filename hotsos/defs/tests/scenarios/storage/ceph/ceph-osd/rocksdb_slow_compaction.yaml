raised-issues:
  CephOSDWarning: >-
    Ceph OSD is experiencing slow RocksDB compaction or thread pool
    timeouts. This is typically caused by high cluster load, large delete
    operations, tombstone accumulation, or RocksDB performance degradation
    rather than corruption. Symptoms include OSD op thread pool timeouts
    and sluggish cluster performance. Recommended actions: (1) For Pacific
    16.2.13+ or Reef+, enable rocksdb_cf_compaction_on_deletion feature to
    automatically compact on deletions and avoid tombstone accumulation,
    (2) Consider performing offline manual compaction during maintenance
    windows using 'ceph-kvstore-tool compact', (3) Enable LZ4 compression
    in RocksDB (bluestore_rocksdb_options with 'compression=kLZ4Compression')
    to improve compaction performance and reduce space usage, (4) Review
    and tune RocksDB compaction settings (max_background_compactions,
    compaction_readahead_size), (5) If issue persists after large delete
    operations, schedule regular offline compaction, (6) Monitor OSD memory
    usage and adjust bluestore_cache_* settings if needed. Note that
    concurrent iteration and deletions with no writes can cause rapid
    tombstone accumulation requiring manual intervention.
