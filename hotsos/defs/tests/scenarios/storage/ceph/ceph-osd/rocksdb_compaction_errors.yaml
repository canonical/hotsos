raised-issues:
  CephOSDError: >-
    Ceph OSD is experiencing RocksDB corruption errors. This typically
    indicates hardware issues such as failing disk, memory corruption,
    or bit rot. The errors may include block checksum mismatches, bad
    table magic numbers, compression dictionary errors, or database
    opening failures during compaction or flush operations. Large (2+GB)
    write operations are particularly susceptible to corruption issues.
    Recommended actions: (1) Check hardware health using smartctl for disk
    errors and memtest86+ for memory issues, (2) Review dmesg and syslog
    for hardware-related errors, (3) Run 'ceph-bluestore-tool fsck' to
    check BlueStore integrity (read-only mode first), (4) Consider setting
    bluefs_buffered_io=false as a workaround for buffered I/O issues,
    (5) If the OSD is severely affected and fsck fails, it may need to be
    removed from the cluster and re-created after addressing the underlying
    hardware issue. Note that RocksDB corruption can lead to OSD crashes
    and data unavailability. See https://tracker.ceph.com/issues/45337 for
    known issues related to large writes with bluefs_buffered_io=true.
