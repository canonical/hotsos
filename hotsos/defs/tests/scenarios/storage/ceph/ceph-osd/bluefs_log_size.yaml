mock:
  patch:
    hotsos.core.plugins.storage.ceph.CephChecks.local_osds_with_oversized_bluefs_log:
      kwargs:
        new: ['osd.0']
raised-issues:
  CephOSDError: >-
    Found OSD(s) osd.0 whose bluefs log file has grown beyond
    53687091200 bytes. This indicates that bluestore failed to invoke
    bluefs log compaction so the log is consuming the DB and WAL device
    space and may fall back to the main device, eventually preventing
    the OSD from starting. Inspect 'ceph daemon osd.N perf dump' for the
    bluefs section ('log_bytes', 'log_compactions', 'db_used_bytes',
    'wal_used_bytes') and consider an online or offline rocksdb compaction.
