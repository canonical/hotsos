raised-issues:
  CephCrushWarning: >-
    Found placement groups with OSDs that violate failure domain
    separation. This means some PGs have multiple OSDs in the same
    failure domain bucket (e.g. same host), reducing data redundancy.
    Affected pools: rbd (2 PGs). Check the CRUSH map and consider
    running 'ceph osd crush reweight-subtree' or adjusting CRUSH
    rules.
