raised-issues:
  CephOSDWarning: >-
    Mixed size OSD disks detected within the same device class: 'hdd'
    (3.41 TiB - 7.11 TiB). Mixed size OSDs can cause data distribution
    imbalance if the CRUSH weights are not set proportionally to disk size.
    Verify that crush weights reflect the actual disk sizes using 'ceph osd
    crush reweight-all' or by manually setting weights with 'ceph osd crush
    reweight <osd> <weight>'. If mixed sizes are intentional (e.g. during a
    migration), ensure CRUSH weights are correct to avoid overloading smaller
    OSDs.
