raised-issues:
  CephCrushWarning: >-
    Significant OSD count imbalance detected across failure domain
    buckets (racks/AZs). One or more buckets have >= 1.33x
    the OSD count of another bucket at the same level. This can
    result in uneven data distribution and reduced fault tolerance
    if an AZ with the majority of OSDs is lost. Consider
    rebalancing by adding OSDs to the smaller buckets or
    redistributing hosts across AZs. Affected: tree 'default' at
    the 'rack' level for device class 'ssd' (OSD counts:
    rack1=8, rack2=4).
