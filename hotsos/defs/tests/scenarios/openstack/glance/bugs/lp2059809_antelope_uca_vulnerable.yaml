raised-bugs:
  https://ubuntu.com/security/CVE-2024-32498: >-
    The version of Openstack Glance (2:26.0.0-0ubuntu1~cloud0) running on this host is
    impacted by security vulnerability CVE-2024-32498 where a
    malicious QCOW2 image with an external data file allows an
    authenticated user to read arbitrary files from the host. Glance is
    affected when image conversion is enabled. There is a fix available in
    the Ubuntu archives and upgrading is recommended.
