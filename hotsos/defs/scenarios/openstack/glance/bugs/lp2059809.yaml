vars:
  glance_version: '@hotsos.core.host_helpers.packaging.AptFactory.version:glance-common'
  openstack_release: '@hotsos.core.plugins.openstack.OpenstackBase.release_name'
  ubuntu_release: '@hotsos.core.plugins.system.SystemBase.os_release_name'
checks:
  pkg_vulnerable_xenial:
    - varops: [[$ubuntu_release], [eq, 'ubuntu xenial']]
    - apt:
        glance-common:
          - lt: '2:12.0.0-0ubuntu2+esm1'
  pkg_vulnerable_queens:
    - varops: [[$openstack_release], [eq, queens]]
    - apt:
        glance-common:
          # bionic / xenial-queens
          - lt: '2:16.0.1-0ubuntu1.1+esm2'
  pkg_vulnerable_ussuri:
    - varops: [[$openstack_release], [eq, ussuri]]
    - apt:
        glance-common:
          # focal / bionic-ussuri
          - lt: '2:20.2.0-0ubuntu1.2~cloud0'
  pkg_vulnerable_yoga:
    - varops: [[$openstack_release], [eq, yoga]]
    - apt:
        glance-common:
          # jammy / focal-yoga
          - lt: '2:24.2.1-0ubuntu1.2~cloud0'
  pkg_vulnerable_antelope:
    - varops: [[$openstack_release], [eq, antelope]]
    - apt:
        glance-common:
          # lunar / jammy-antelope
          - lt: '2:26.0.0-0ubuntu1.2~cloud0'
  pkg_vulnerable_bobcat:
    - varops: [[$openstack_release], [eq, bobcat]]
    - apt:
        glance-common:
          # mantic / jammy-bobcat
          - lt: '2:27.0.0-0ubuntu1.2~cloud0'
  pkg_vulnerable_caracal:
    - varops: [[$openstack_release], [eq, caracal]]
    - apt:
        glance-common:
          # noble / jammy-caracal
          - lt: '2:28.0.1-0ubuntu1.2~cloud0'
  image_conversion_enabled:
    config:
      handler: 'hotsos.core.plugins.openstack.OpenstackConfig'
      path: 'etc/glance/glance-api.conf'
      assertions:
        - section: image_import_opts
          key: image_import_plugins
          ops: [[contains, image_conversion]]
conclusions:
  pkg_is_vulnerable:
    decision:
      - or:
          - pkg_vulnerable_xenial
          - pkg_vulnerable_queens
          - pkg_vulnerable_ussuri
          - pkg_vulnerable_yoga
          - pkg_vulnerable_antelope
          - pkg_vulnerable_bobcat
          - pkg_vulnerable_caracal
      - image_conversion_enabled
    raises:
      type: UbuntuCVE
      cve-id: CVE-2024-32498
      message: >-
        The version of Openstack Glance ({version}) running on this host is
        impacted by security vulnerability CVE-2024-32498 where a
        malicious QCOW2 image with an external data file allows an
        authenticated user to read arbitrary files from the host. Glance is
        affected when image conversion is enabled. There is a fix available in
        the Ubuntu archives and upgrading is recommended.
      format-dict:
        version: $glance_version
