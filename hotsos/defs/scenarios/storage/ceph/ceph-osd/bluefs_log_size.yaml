checks:
  osds_with_oversized_bluefs_log:
    property:
      path: hotsos.core.plugins.storage.ceph.CephChecks.local_osds_with_oversized_bluefs_log
      ops: [[length_hint], [gt, 0]]
conclusions:
  osds-have-oversized-bluefs-log:
    decision: osds_with_oversized_bluefs_log
    raises:
      type: CephOSDError
      message: >-
        Found OSD(s) {bad_osds} whose bluefs log file has grown beyond
        50 GiB. This indicates that bluestore failed to invoke bluefs log
        compaction so the log is consuming the DB and WAL device space and
        may fall back to the main device, eventually preventing the OSD
        from starting. Inspect 'ceph daemon osd.N perf dump' for the bluefs
        section ('log_bytes', 'log_compactions', 'db_used_bytes',
        'wal_used_bytes') and consider an online or offline rocksdb compaction.
      format-dict:
        bad_osds: '@checks.osds_with_oversized_bluefs_log.requires.value_actual:comma_join'
